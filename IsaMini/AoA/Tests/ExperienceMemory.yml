- experience `deriv_strategy`:
  When to use: Establishing the derivative of a function.
  Experience: Use `Obvious with facts derivative_eq_intros`; it also discharges a pre-simplified derivative value.
- experience `ring_identity_from_hypothesis_obvious_flaky`:
  When to use: Deriving a polynomial/ring identity (e.g. a cross-multiplied / determinant equation) from a given hypothesis that is the SAME identity up to sign after full expansion — the goal follows from the hypothesis only by ring rearrangement, not by simple substitution.
  Experience: Two lessons. (1) `Obvious [Hdet]` on such a ring-rearrangement goal is FLAKY: the exact same `Obvious [hyp]` proof succeeded on one branch (identical `cross2` goal) yet failed on a sibling branch (`cross`) — its automation is timeout/nondeterminism sensitive for degree-2 polynomial rearrangement. So do not rely on `Obvious` alone here. (2) The system BLOCKS re-submitting an identical `Obvious` after it once failed ("You cannot claim the goal is obvious again"), so you cannot simply retry — you must give a genuinely different, step-by-step proof or delegate. Robust plan: expand both goal and hypothesis with the `algebra_simps` bundle (via `Rewrite`) into sums of monomials, or introduce the UNCONDITIONAL ring identity `goalLHS - goalRHS + (hypLHS - hypRHS) = 0` as a `Have` (true with no premises) and combine it with the hypothesis by linear arithmetic / `Chaining`. Delegating this self-contained sub-part to a sub-agent (which can try `algebra`/`argo`) keeps it off the main proof line.
- experience `irrationality_of_sqrt_of_prime`:
  When to use: Proving sqrt of a prime (or non-square) is irrational, i.e. a real number is not rational, via the classical coprime-fraction contradiction.
  Experience: Structure: Have `1 < p` (prime_gt_1_int), then Contradiction to assume `sqrt (real_of_int p) ∈ ℚ`. Key non-obvious lemma: `Rats_abs_nat_div_natE` is an elimination rule that turns `x ∈ ℚ` into obtained nats m,n with `n ≠ 0`, `¦x¦ = real m / real n`, and `coprime m n`. Fill the Obtain proof with `Obvious` giving facts [the-membership-hyp, Rats_abs_nat_div_natE discharged by that hyp]. Then: (1) square the fraction relation to get the INTEGER equation `(int m)^2 = p * (int n)^2` — derive the real equation `(real m)^2 = real_of_int p * (real n)^2` using real_sqrt_pow2 (needs p≥0 from prime_ge_0_int/p>1) and power_mult_distrib, then transfer to integers by of_int/of_nat injectivity (linarith or of_int_eq_iff often closes it). (2) `p dvd int m ∧ p dvd int n`: from the equation p dvd (int m)^2 so p dvd int m by prime_dvd_power_int_iff; obtain k with int m = p*k, substitute, cancel p to get (int n)^2 = p*k^2, so p dvd int n likewise. (3) `p = 1`: coprime m n (nat) lifts to coprime (int m)(int n) (coprime_int_iff); p a common divisor of two coprimes is a unit (coprime_common_divisor), so p dvd 1, and with p>0 gives p=1 — contradicting 1<p. Delegating steps (1),(2),(3) to sub-agents worked well; each is self-contained given the stated intermediate facts.
- experience `list_induct2_parallel_induction_over_two_lists`:
  When to use: Proving a statement about two lists of equal length that must be established by parallel/simultaneous induction stepping both lists together (e.g. sum_list xs ≤ sum_list ys when zipped elements are pointwise ≤), i.e. the Isar `induct xs ys rule: list_induct2` idiom.
  Experience: |
    Two lessons.
    
    (1) Premise generalization: after an initial `Intro` fixes xs, ys and assumes the premises (length equality, the ∀-over-zip pointwise condition), those premises are tied to the SPECIFIC xs, ys and will NOT generalize under induction. Do NOT induct on the live goal. Instead state a fresh `Have general` quantified `for_any` BOTH lists (as, bs), with the length equality as a named premise `len` and the rest of the implication as the conclusion, and run the induction inside it. Then close the real goal with one `Obvious [general instantiated with xs,ys (discharge len by premise0), premise0, premise1]`.
    
    (2) Driving list_induct2 through the single-target `Induction` op is quirky. Set `rule: {name: list_induct2, discharge: [{name: len}]}` and give `target_isabelle_term: "as"`. The tool binds your target `as` to the rule's SECOND slot ?ys (the length premise shows as `length ?xs = length as`) and then asks you to instantiate the remaining schematic `?xs` — answer with the OTHER list `bs`. Roles end up swapped (the emitted P u v reads sum_list v ≤ sum_list u, zip v u), but the proof stays internally consistent and provable. When asked which context vars to generalize, generalize NONE of the outer goal's xs, ys (they're unrelated to as/bs).
    
    Cases produced (simplify on): (i) a spurious `length bs = length as` discharge goal → `Obvious [len]` (symmetry). (ii) base `sum_list [] ≤ sum_list []` → `Obvious []`. (iii) step `y + sum_list ys1 ≤ x + sum_list xs1` with an auto-`Intro` giving premise `∀x1 y1. x1=y ∧ y1=x ⟶ y≤x` (yields y≤x) and the pointwise premise, plus IH `pointwise ⟶ sum_list ys1 ≤ sum_list xs1`. Close with `Obvious [add_mono, premise3(1), IH discharged by premise3(2)]`. `add_mono` is [manual] so must be supplied explicitly.
