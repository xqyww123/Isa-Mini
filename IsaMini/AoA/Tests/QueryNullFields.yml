- Code_Numeral.Suc: natural ⇒ natural
  The successor operation on the type `natural`: it maps a value to the next larger one, i.e. adds one to it. This is the `natural`-type analogue of the successor function on ordinary natural numbers.
  lift_definition Suc :: "natural ⇒ natural"
    is Nat.Suc
- Suc: nat ⇒ nat
  The successor function on natural numbers, taking one natural number and returning the next one (`nat ⇒ nat`). Informally, `Suc n` denotes `n + 1`. It is the operation that, applied repeatedly to zero, generates every natural number. It is the counterpart, lifted to the abstract type `nat`, of the raw successor operation on the underlying individuals.
  definition Suc :: "nat ⇒ nat"
    where "Suc n = Abs_Nat (Suc_Rep (Rep_Nat n))"
- natural_of_nat: nat ⇒ natural
  The function that converts an ordinary mathematical natural number of type `nat` into the corresponding value of the code-generation type `natural`.
  typedef natural = "UNIV :: nat set"
    morphisms nat_of_natural natural_of_nat
- of_nat: nat ⇒ ?'a
  The canonical embedding of the natural numbers into any semiring that has a multiplicative identity (a type with addition, multiplication, a zero, and a one satisfying the usual arithmetic laws). It takes a natural number `n` and returns the corresponding element of the target type, namely the result of adding the target's one to itself `n` times (so zero maps to the target's zero and each successor adds one more). In short, it interprets a natural number as the matching element built from repeated additions of one in the semiring.
  definition of_nat :: "nat ⇒ 'a"
    where "of_nat n = (plus 1 ^^ n) 0"
- case_natural: ?'t ⇒ (natural ⇒ ?'t) ⇒ natural ⇒ ?'t
  The case-distinction combinator for the type `natural`, viewed as built from the two constructors zero and successor. Given a value to return for the zero case and a function to apply in the successor case, it inspects a `natural` argument: if the argument is zero it returns the first value, and if it is the successor of some `natural` value `m` it applies the function to `m`.
  old_rep_datatype "0::natural" Suc
