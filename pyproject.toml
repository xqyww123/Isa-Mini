[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "IsaMini"
version = "0.3.5"
description = "The minimal proof language for Isabelle"
readme = "README.md"
license = "LGPL-2.1-or-later"
authors = [
    { name="Qiyuan Xu", email="xqyww123@gmail.com" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = ["msgpack"]

[project.optional-dependencies]
agent = ["Isabelle_RPC_Host", "claude-agent-sdk>=0.1.72"]

[project.urls]
"Homepage" = "https://github.com/xqyww123/Isa-Proof-Shell"

[tool.setuptools.packages.find]
include = ["IsaMini", "IsaMini.*"]

[tool.setuptools.package-data]
"IsaMini.AoA" = ["tools/*.json"]
