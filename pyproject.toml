[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "IsaMini"
version = "0.3.5"
description = "The minimal proof language for Isabelle"
readme = "README.md"
license = "LGPL-2.1-or-later"
authors = [
    { name="Qiyuan Xu", email="xqyww123@gmail.com" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "msgpack>=1.1.2",
    "Isabelle_RPC_Host>=0.2.0",
    "Isabelle_Semantic_Embedding>=0.1.0",
    "PyYAML>=6.0.3",
    "platformdirs>=4.9.4",
    "jsoncomment>=0.4.2",
    "claude-agent-sdk>=0.1.72",
    "zstandard>=0.23.0",
]

[project.optional-dependencies]
openai = ["openai>=2.33.0", "openai-agents>=0.15.1"]
openai-api = ["openai>=2.33.0", "httpx>=0.28.1"]
gemini = ["google-genai>=1.75.0", "httpx>=0.28.1"]
anthropic = ["anthropic>=0.52.0", "httpx>=0.28.1"]
api = ["IsaMini[openai-api,gemini,anthropic]"]
mcp = ["uvicorn>=0.41.0", "mcp>=1.26.0"]
web = ["aiohttp>=3.13.5"]
all = ["IsaMini[openai,api,mcp,web]"]

[project.urls]
"Homepage" = "https://github.com/xqyww123/Isa-Mini"

[tool.setuptools.packages.find]
include = ["IsaMini", "IsaMini.*"]

[tool.setuptools.package-data]
"IsaMini.AoA" = ["tools/*.json"]
